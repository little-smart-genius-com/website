name: Backup repo to Google Drive

on:
  # Run automatically every week on Sunday at midnight UTC
  schedule:
    - cron: '0 0 * * 0'
  
  # Run automatically when a new snapshot/release is created
  release:
    types: [published]
    
  # Allow running manually from the Actions tab
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout entire repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # ensures we grab all files and history
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Google API client dependencies 
      run: |
        python -m pip install --upgrade pip
        pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib
        
    - name: Create Zip Archive
      id: zip_files
      run: |
        # Use current date to name the backup file
        DATE=$(date +'%Y-%m-%d')
        BACKUP_FILENAME="LSG_Backup_$DATE.zip"
        
        # Exclude .git and .github to keep it clean (optional)
        zip -r "$BACKUP_FILENAME" . -x "*.git/*"
        
        echo "filename=$BACKUP_FILENAME" >> $GITHUB_OUTPUT
        
    - name: Upload to Google Drive
      env:
        GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
      run: |
        python scripts/upload_to_drive.py "${{ steps.zip_files.outputs.filename }}" "$GDRIVE_FOLDER_ID"
