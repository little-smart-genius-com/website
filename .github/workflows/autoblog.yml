# ============================================================
# Little Smart Genius — Auto-Blog V6 Ultimate Pipeline
# ============================================================
# Hybrid DeepSeek model: reasoner for Architect+Validator,
# chat for Writers/ArtDirector/Assembler
#
# Escalating schedule:
#   Week 1-3:  3 articles/day (1 matin + 1 aprem + 1 soir)
#   Week 4-6:  4 articles/day (1 matin + 2 aprem + 1 soir)
#   Week 7-9:  5 articles/day (2 matin + 2 aprem + 1 soir)
#   Week 10+:  6 articles/day (2 matin + 2 aprem + 2 soir)
# ============================================================

name: Daily Auto-Blog V6

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: false
        default: 'generate-batch'
        type: choice
        options:
          - generate-batch
          - generate-keyword
          - generate-product
          - generate-freebie
          - build-site
          - full-rebuild
          - fix-images
          - maintenance-scan
          - regenerate-article
          - comprehensive-repair
          - humanize
          - regen-all-images
          - instagram-batch
      slug:
        description: 'Article slug (for regenerate-article or fix-images on a single article)'
        required: false
        default: ''
        type: string
      model:
        description: 'Model for image regeneration (zimage, flux, gptimage)'
        required: false
        default: 'zimage'
        type: string
  schedule:
    # Matin slot 1  — always
    - cron: '0 8 * * *'
    # Matin slot 2  — week 7+
    - cron: '30 9 * * *'
    # Après-midi slot 1 — always
    - cron: '0 14 * * *'
    # Après-midi slot 2 — week 4+
    - cron: '30 15 * * *'
    # Soir slot 1 — always
    - cron: '0 20 * * *'
    # Soir slot 2 — week 10+
    - cron: '30 21 * * *'
    # FINAL HANDS-OFF TEST (Current time ~03:55 UTC) -> Trigger at 04:05 UTC
    - cron: '5 4 * * *'

permissions:
  contents: write

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT || github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-dejavu-core
          pip install -r scripts/requirements.txt

      - name: Determine action
        id: action
        run: |
          ACTION="${{ github.event.inputs.action || 'schedule' }}"
          SLUG="${{ github.event.inputs.slug || '' }}"
          CRON="${{ github.event.schedule || '' }}"
          MODEL="${{ github.event.inputs.model || 'zimage' }}"
          echo "action=$ACTION" >> $GITHUB_OUTPUT
          echo "slug=$SLUG" >> $GITHUB_OUTPUT
          echo "cron=$CRON" >> $GITHUB_OUTPUT
          echo "model=$MODEL" >> $GITHUB_OUTPUT
          echo "Running action: $ACTION (slug: $SLUG, cron: $CRON, model: $MODEL)"

      # ── GENERATE ARTICLES (V6 Ultimate) ──
      - name: Generate articles
        if: steps.action.outputs.action != 'build-site' && steps.action.outputs.action != 'full-rebuild' && steps.action.outputs.action != 'maintenance-scan' && steps.action.outputs.action != 'fix-images' && steps.action.outputs.action != 'regenerate-article'
        env:
          # DeepSeek Keys (7 keys for parallel agents)
          DEEPSEEK_API_KEY_1: ${{ secrets.DEEPSEEK_API_KEY_1 }}
          DEEPSEEK_API_KEY_2: ${{ secrets.DEEPSEEK_API_KEY_2 }}
          DEEPSEEK_API_KEY_3: ${{ secrets.DEEPSEEK_API_KEY_3 }}
          DEEPSEEK_API_KEY_4: ${{ secrets.DEEPSEEK_API_KEY_4 }}
          DEEPSEEK_API_KEY_5: ${{ secrets.DEEPSEEK_API_KEY_5 }}
          DEEPSEEK_API_KEY_6: ${{ secrets.DEEPSEEK_API_KEY_6 }}
          DEEPSEEK_API_KEY_7: ${{ secrets.DEEPSEEK_API_KEY_7 }}
          # Pollinations Image Keys (5 primary + 5 backup)
          POLLINATIONS_API_KEY_1: ${{ secrets.POLLINATIONS_API_KEY_1 }}
          POLLINATIONS_API_KEY_2: ${{ secrets.POLLINATIONS_API_KEY_2 }}
          POLLINATIONS_API_KEY_3: ${{ secrets.POLLINATIONS_API_KEY_3 }}
          POLLINATIONS_API_KEY_4: ${{ secrets.POLLINATIONS_API_KEY_4 }}
          POLLINATIONS_API_KEY_5: ${{ secrets.POLLINATIONS_API_KEY_5 }}
          POLLINATIONS_API_KEY_BCK_1: ${{ secrets.POLLINATIONS_API_KEY_BCK_1 }}
          POLLINATIONS_API_KEY_BCK_2: ${{ secrets.POLLINATIONS_API_KEY_BCK_2 }}
          POLLINATIONS_API_KEY_BCK_3: ${{ secrets.POLLINATIONS_API_KEY_BCK_3 }}
          POLLINATIONS_API_KEY_BCK_4: ${{ secrets.POLLINATIONS_API_KEY_BCK_4 }}
          POLLINATIONS_API_KEY_BCK_5: ${{ secrets.POLLINATIONS_API_KEY_BCK_5 }}
          POLLINATIONS_API_KEY_20: ${{ secrets.POLLINATIONS_API_KEY_20 }}
          POLLINATIONS_API_KEY_21: ${{ secrets.POLLINATIONS_API_KEY_21 }}
          POLLINATIONS_API_KEY_22: ${{ secrets.POLLINATIONS_API_KEY_22 }}
          POLLINATIONS_API_KEY_23: ${{ secrets.POLLINATIONS_API_KEY_23 }}
          POLLINATIONS_API_KEY_24: ${{ secrets.POLLINATIONS_API_KEY_24 }}
          POLLINATIONS_API_KEY_25: ${{ secrets.POLLINATIONS_API_KEY_25 }}
          POLLINATIONS_API_KEY_26: ${{ secrets.POLLINATIONS_API_KEY_26 }}
          POLLINATIONS_API_KEY_27: ${{ secrets.POLLINATIONS_API_KEY_27 }}
          POLLINATIONS_API_KEY_28: ${{ secrets.POLLINATIONS_API_KEY_28 }}
          POLLINATIONS_API_KEY_29: ${{ secrets.POLLINATIONS_API_KEY_29 }}
          POLLINATIONS_API_KEY_30: ${{ secrets.POLLINATIONS_API_KEY_30 }}
          POLLINATIONS_API_KEY_31: ${{ secrets.POLLINATIONS_API_KEY_31 }}
          POLLINATIONS_API_KEY_32: ${{ secrets.POLLINATIONS_API_KEY_32 }}
          POLLINATIONS_API_KEY_33: ${{ secrets.POLLINATIONS_API_KEY_33 }}
          # Other
          MAKECOM_WEBHOOK_URL: ${{ secrets.MAKECOM_WEBHOOK_URL }}
          LAUNCH_DATE: '2026-03-10'
          PYTHONIOENCODING: utf-8
        run: |
          ACTION="${{ steps.action.outputs.action }}"
          case "$ACTION" in
            generate-keyword)  python scripts/auto_blog_v6_ultimate.py --slot keyword ;;
            generate-product)  python scripts/auto_blog_v6_ultimate.py --slot product ;;
            generate-freebie)  python scripts/auto_blog_v6_ultimate.py --slot freebie ;;
            generate-batch)    python scripts/auto_blog_v6_ultimate.py --batch ;;
            schedule)          python scripts/auto_blog_v6_ultimate.py --schedule --cron "${{ steps.action.outputs.cron }}" ;;
          esac

      # ── REGENERATE SINGLE ARTICLE ──
      - name: Regenerate single article
        if: steps.action.outputs.action == 'regenerate-article' && steps.action.outputs.slug != ''
        env:
          DEEPSEEK_API_KEY_1: ${{ secrets.DEEPSEEK_API_KEY_1 }}
          DEEPSEEK_API_KEY_2: ${{ secrets.DEEPSEEK_API_KEY_2 }}
          DEEPSEEK_API_KEY_3: ${{ secrets.DEEPSEEK_API_KEY_3 }}
          DEEPSEEK_API_KEY_4: ${{ secrets.DEEPSEEK_API_KEY_4 }}
          DEEPSEEK_API_KEY_5: ${{ secrets.DEEPSEEK_API_KEY_5 }}
          DEEPSEEK_API_KEY_6: ${{ secrets.DEEPSEEK_API_KEY_6 }}
          DEEPSEEK_API_KEY_7: ${{ secrets.DEEPSEEK_API_KEY_7 }}
          POLLINATIONS_API_KEY_1: ${{ secrets.POLLINATIONS_API_KEY_1 }}
          POLLINATIONS_API_KEY_2: ${{ secrets.POLLINATIONS_API_KEY_2 }}
          POLLINATIONS_API_KEY_3: ${{ secrets.POLLINATIONS_API_KEY_3 }}
          POLLINATIONS_API_KEY_4: ${{ secrets.POLLINATIONS_API_KEY_4 }}
          POLLINATIONS_API_KEY_5: ${{ secrets.POLLINATIONS_API_KEY_5 }}
          POLLINATIONS_API_KEY_BCK_1: ${{ secrets.POLLINATIONS_API_KEY_BCK_1 }}
          POLLINATIONS_API_KEY_BCK_2: ${{ secrets.POLLINATIONS_API_KEY_BCK_2 }}
          POLLINATIONS_API_KEY_BCK_3: ${{ secrets.POLLINATIONS_API_KEY_BCK_3 }}
          POLLINATIONS_API_KEY_BCK_4: ${{ secrets.POLLINATIONS_API_KEY_BCK_4 }}
          POLLINATIONS_API_KEY_BCK_5: ${{ secrets.POLLINATIONS_API_KEY_BCK_5 }}
          POLLINATIONS_API_KEY_20: ${{ secrets.POLLINATIONS_API_KEY_20 }}
          POLLINATIONS_API_KEY_21: ${{ secrets.POLLINATIONS_API_KEY_21 }}
          POLLINATIONS_API_KEY_22: ${{ secrets.POLLINATIONS_API_KEY_22 }}
          POLLINATIONS_API_KEY_23: ${{ secrets.POLLINATIONS_API_KEY_23 }}
          POLLINATIONS_API_KEY_24: ${{ secrets.POLLINATIONS_API_KEY_24 }}
          POLLINATIONS_API_KEY_25: ${{ secrets.POLLINATIONS_API_KEY_25 }}
          POLLINATIONS_API_KEY_26: ${{ secrets.POLLINATIONS_API_KEY_26 }}
          POLLINATIONS_API_KEY_27: ${{ secrets.POLLINATIONS_API_KEY_27 }}
          POLLINATIONS_API_KEY_28: ${{ secrets.POLLINATIONS_API_KEY_28 }}
          POLLINATIONS_API_KEY_29: ${{ secrets.POLLINATIONS_API_KEY_29 }}
          POLLINATIONS_API_KEY_30: ${{ secrets.POLLINATIONS_API_KEY_30 }}
          POLLINATIONS_API_KEY_31: ${{ secrets.POLLINATIONS_API_KEY_31 }}
          POLLINATIONS_API_KEY_32: ${{ secrets.POLLINATIONS_API_KEY_32 }}
          POLLINATIONS_API_KEY_33: ${{ secrets.POLLINATIONS_API_KEY_33 }}
          MAKECOM_WEBHOOK_URL: ${{ secrets.MAKECOM_WEBHOOK_URL }}
          LAUNCH_DATE: '2026-03-10'
          PYTHONIOENCODING: utf-8
          SLUG: ${{ steps.action.outputs.slug }}
        run: python scripts/auto_blog_v6_ultimate.py --regenerate "$SLUG"

      # ── FIX IMAGES ──
      - name: Fix missing images
        if: steps.action.outputs.action == 'fix-images'
        env:
          POLLINATIONS_API_KEY_1: ${{ secrets.POLLINATIONS_API_KEY_1 }}
          POLLINATIONS_API_KEY_2: ${{ secrets.POLLINATIONS_API_KEY_2 }}
          POLLINATIONS_API_KEY_3: ${{ secrets.POLLINATIONS_API_KEY_3 }}
          POLLINATIONS_API_KEY_4: ${{ secrets.POLLINATIONS_API_KEY_4 }}
          POLLINATIONS_API_KEY_5: ${{ secrets.POLLINATIONS_API_KEY_5 }}
          POLLINATIONS_API_KEY_BCK_1: ${{ secrets.POLLINATIONS_API_KEY_BCK_1 }}
          POLLINATIONS_API_KEY_BCK_2: ${{ secrets.POLLINATIONS_API_KEY_BCK_2 }}
          POLLINATIONS_API_KEY_BCK_3: ${{ secrets.POLLINATIONS_API_KEY_BCK_3 }}
          POLLINATIONS_API_KEY_BCK_4: ${{ secrets.POLLINATIONS_API_KEY_BCK_4 }}
          POLLINATIONS_API_KEY_BCK_5: ${{ secrets.POLLINATIONS_API_KEY_BCK_5 }}
          POLLINATIONS_API_KEY_20: ${{ secrets.POLLINATIONS_API_KEY_20 }}
          POLLINATIONS_API_KEY_21: ${{ secrets.POLLINATIONS_API_KEY_21 }}
          POLLINATIONS_API_KEY_22: ${{ secrets.POLLINATIONS_API_KEY_22 }}
          POLLINATIONS_API_KEY_23: ${{ secrets.POLLINATIONS_API_KEY_23 }}
          POLLINATIONS_API_KEY_24: ${{ secrets.POLLINATIONS_API_KEY_24 }}
          POLLINATIONS_API_KEY_25: ${{ secrets.POLLINATIONS_API_KEY_25 }}
          POLLINATIONS_API_KEY_26: ${{ secrets.POLLINATIONS_API_KEY_26 }}
          POLLINATIONS_API_KEY_27: ${{ secrets.POLLINATIONS_API_KEY_27 }}
          POLLINATIONS_API_KEY_28: ${{ secrets.POLLINATIONS_API_KEY_28 }}
          POLLINATIONS_API_KEY_29: ${{ secrets.POLLINATIONS_API_KEY_29 }}
          POLLINATIONS_API_KEY_30: ${{ secrets.POLLINATIONS_API_KEY_30 }}
          POLLINATIONS_API_KEY_31: ${{ secrets.POLLINATIONS_API_KEY_31 }}
          POLLINATIONS_API_KEY_32: ${{ secrets.POLLINATIONS_API_KEY_32 }}
          POLLINATIONS_API_KEY_33: ${{ secrets.POLLINATIONS_API_KEY_33 }}
          PYTHONIOENCODING: utf-8
          SLUG: ${{ steps.action.outputs.slug }}
          MODEL: ${{ steps.action.outputs.model }}
        run: |
          RAW_SLUG="${{ steps.action.outputs.slug }}"
          # Parse slug field: slug::force::image-type (e.g. my-article::force::cover)
          # Extract slug part (everything before first ::)
          SLUG_PART="${RAW_SLUG%%::*}"
          
          # Pass the model (fallback to zimage if empty)
          MODEL_VAL="${MODEL:-zimage}"
          ARGS="--model $MODEL_VAL"
          
          if [ -n "$SLUG_PART" ] && [ "$SLUG_PART" != "" ]; then
            ARGS="--slug $SLUG_PART"
          fi
          if echo "$RAW_SLUG" | grep -q "::force"; then
            ARGS="$ARGS --force"
          fi
          # Extract image type after ::force:: (e.g. cover, img1, img2...)
          if echo "$RAW_SLUG" | grep -q "::force::"; then
            IMG_TYPE="${RAW_SLUG##*::force::}"
            if [ -n "$IMG_TYPE" ] && [ "$IMG_TYPE" != "$RAW_SLUG" ]; then
              ARGS="$ARGS --image-type $IMG_TYPE"
            fi
          fi
          echo "Running: python scripts/fix_images.py $ARGS"
          python scripts/fix_images.py $ARGS

      # ── BUILD PIPELINE ──
      - name: Build articles (JSON → HTML)
        if: steps.action.outputs.action != 'maintenance-scan'
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/build_articles.py

      - name: Generate OG images (1200×630 branded)
        if: steps.action.outputs.action != 'maintenance-scan'
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/generate_og_images.py

      - name: Rebuild blog listing pages
        if: steps.action.outputs.action != 'maintenance-scan'
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/rebuild_blog_pages.py

      - name: Post-process (related articles + backlinks)
        if: steps.action.outputs.action != 'maintenance-scan'
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/_post_process.py

      - name: Inject search index
        if: steps.action.outputs.action != 'maintenance-scan'
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/_inject_search.py

      # ── MEDIUM SYNDICATION ──
      - name: Publish to Medium (Summarizer & RSS)
        if: steps.action.outputs.action != 'maintenance-scan' && steps.action.outputs.action != 'comprehensive-repair'
        env:
          DEEPSEEK_API_KEY_1: ${{ secrets.DEEPSEEK_API_KEY_1 }}
          DEEPSEEK_API_KEY_2: ${{ secrets.DEEPSEEK_API_KEY_2 }}
          DEEPSEEK_API_KEY_3: ${{ secrets.DEEPSEEK_API_KEY_3 }}
          DEEPSEEK_API_KEY_4: ${{ secrets.DEEPSEEK_API_KEY_4 }}
          DEEPSEEK_API_KEY_5: ${{ secrets.DEEPSEEK_API_KEY_5 }}
          DEEPSEEK_API_KEY_6: ${{ secrets.DEEPSEEK_API_KEY_6 }}
          DEEPSEEK_API_KEY_7: ${{ secrets.DEEPSEEK_API_KEY_7 }}
          PYTHONIOENCODING: utf-8
        run: |
          echo "Generating new Medium abstracts via DeepSeek API..."
          python scripts/medium_publisher.py
          echo "Building Medium HTML pages and generating RSS payload for Zapier..."
          python scripts/build_medium_pages.py

      # ── COMPREHENSIVE REPAIR ──
      - name: Comprehensive SEO repair
        if: steps.action.outputs.action == 'comprehensive-repair'
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/comprehensive_repair.py

      # ── HUMANIZE ──
      - name: Humanize articles (remove AI phrases)
        if: steps.action.outputs.action == 'humanize'
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/humanize_existing_posts.py

      # ── REGEN ALL IMAGES ──
      - name: Regenerate all article images
        if: steps.action.outputs.action == 'regen-all-images'
        env:
          POLLINATIONS_API_KEY_1: ${{ secrets.POLLINATIONS_API_KEY_1 }}
          POLLINATIONS_API_KEY_2: ${{ secrets.POLLINATIONS_API_KEY_2 }}
          POLLINATIONS_API_KEY_3: ${{ secrets.POLLINATIONS_API_KEY_3 }}
          POLLINATIONS_API_KEY_4: ${{ secrets.POLLINATIONS_API_KEY_4 }}
          POLLINATIONS_API_KEY_5: ${{ secrets.POLLINATIONS_API_KEY_5 }}
          POLLINATIONS_API_KEY_BCK_1: ${{ secrets.POLLINATIONS_API_KEY_BCK_1 }}
          POLLINATIONS_API_KEY_BCK_2: ${{ secrets.POLLINATIONS_API_KEY_BCK_2 }}
          POLLINATIONS_API_KEY_BCK_3: ${{ secrets.POLLINATIONS_API_KEY_BCK_3 }}
          POLLINATIONS_API_KEY_BCK_4: ${{ secrets.POLLINATIONS_API_KEY_BCK_4 }}
          POLLINATIONS_API_KEY_BCK_5: ${{ secrets.POLLINATIONS_API_KEY_BCK_5 }}
          POLLINATIONS_API_KEY_20: ${{ secrets.POLLINATIONS_API_KEY_20 }}
          POLLINATIONS_API_KEY_21: ${{ secrets.POLLINATIONS_API_KEY_21 }}
          POLLINATIONS_API_KEY_22: ${{ secrets.POLLINATIONS_API_KEY_22 }}
          POLLINATIONS_API_KEY_23: ${{ secrets.POLLINATIONS_API_KEY_23 }}
          POLLINATIONS_API_KEY_24: ${{ secrets.POLLINATIONS_API_KEY_24 }}
          POLLINATIONS_API_KEY_25: ${{ secrets.POLLINATIONS_API_KEY_25 }}
          POLLINATIONS_API_KEY_26: ${{ secrets.POLLINATIONS_API_KEY_26 }}
          POLLINATIONS_API_KEY_27: ${{ secrets.POLLINATIONS_API_KEY_27 }}
          POLLINATIONS_API_KEY_28: ${{ secrets.POLLINATIONS_API_KEY_28 }}
          POLLINATIONS_API_KEY_29: ${{ secrets.POLLINATIONS_API_KEY_29 }}
          POLLINATIONS_API_KEY_30: ${{ secrets.POLLINATIONS_API_KEY_30 }}
          POLLINATIONS_API_KEY_31: ${{ secrets.POLLINATIONS_API_KEY_31 }}
          POLLINATIONS_API_KEY_32: ${{ secrets.POLLINATIONS_API_KEY_32 }}
          POLLINATIONS_API_KEY_33: ${{ secrets.POLLINATIONS_API_KEY_33 }}
          PYTHONIOENCODING: utf-8
        run: python scripts/regen_all_images.py

      # ── INSTAGRAM ──
      - name: Generate Instagram posts
        if: steps.action.outputs.action != 'maintenance-scan'
        env:
          PYTHONIOENCODING: utf-8
        run: python scripts/instagram_generator.py

      # ── MAINTENANCE ──
      - name: Run maintenance
        run: python scripts/maintenance.py --stats

      # ── COMMIT & PUSH ──
      - name: Commit and push changes
        run: |
          git config user.name "Auto-Blog Bot"
          git config user.email "bot@littlesmartgenius.com"
          git add -A
          CHANGES=$(git diff --cached --stat)
          if [ -n "$CHANGES" ]; then
            DATE=$(date +%Y-%m-%d)
            HOUR=$(date +%H)
            ACTION="${{ steps.action.outputs.action }}"
            git commit -m "Auto-blog V6: ${DATE} ${HOUR}h — ${ACTION}"
            # Pull remote changes and auto-resolve conflicts in generated files
            for i in 1 2 3 4 5; do
              echo "Attempt $i..."
              if git pull --rebase origin main; then
                echo "Rebase succeeded"
              else
                echo "Rebase conflict detected, auto-resolving generated files..."
                # Accept OUR version for all generated/rebuilt files (they are always rebuilt from scratch)
                git diff --name-only --diff-filter=U | while read conflicted; do
                  echo "  Auto-resolving: $conflicted"
                  git checkout --theirs "$conflicted" 2>/dev/null || git checkout --ours "$conflicted" 2>/dev/null || true
                  git add "$conflicted" 2>/dev/null || true
                done
                # If there are still unmerged paths, accept ours for everything
                if git diff --name-only --diff-filter=U | grep -q .; then
                  git checkout --ours . 2>/dev/null || true
                  git add -A
                fi
                git rebase --continue 2>/dev/null || git rebase --skip 2>/dev/null || true
              fi
              if git push origin main; then
                echo "Changes pushed successfully"
                exit 0
              fi
              echo "Push failed, retrying in 5 seconds..."
              sleep 5
            done
            echo "Failed to push changes after multiple attempts"
            exit 1
          else
            echo "No changes to commit"
          fi

      # ── INDEXNOW — Notify search engines immediately ──
      - name: Submit to IndexNow
        if: steps.action.outputs.action != 'maintenance-scan'
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "⚠️ INDEXNOW_KEY not set, skipping"
            exit 0
          fi
          echo "📡 Submitting sitemap to IndexNow..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.indexnow.org/indexnow?url=https://littlesmartgenius.com/sitemap.xml&key=${INDEXNOW_KEY}")
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "202" ]; then
            echo "✅ IndexNow accepted (HTTP $RESPONSE)"
          else
            echo "⚠️ IndexNow returned HTTP $RESPONSE (non-critical)"
          fi
